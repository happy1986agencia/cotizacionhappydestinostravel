<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Destinoss Travel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#eef2f7;color:#2c3e50;}
.container{max-width:900px;margin:30px auto;padding:20px;}
.card{background:white;border-radius:15px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-top:20px;overflow:hidden;border-left:5px solid #c9a646;}
.card-header{background:#0b2d5c;color:#c9a646;padding:15px;font-weight:bold;font-size:18px;letter-spacing:1px;}
.card-body{padding:20px;}
.row{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:15px;}
.item{flex:1;min-width:200px;}
.label{font-size:12px;color:#7f8c8d;text-transform:uppercase;}
.value{font-weight:bold;margin-top:5px;color:#0b2d5c;}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2d5c;color:#ffd86b;border:none;padding:12px;border-radius:10px;cursor:pointer;font-weight:bold;width:100%;margin-top:10px;}
.whatsapp{background:#25D366;color:white;}
.badge{background:#0b2d5c;color:#ffd86b;padding:15px;border-radius:50px;text-align:center;font-weight:bold;font-size:18px;margin-bottom:20px;}
.logo{display:block;margin:auto;max-width:180px;margin-bottom:10px;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.nit{text-align:center;font-size:13px;margin-top:5px;color:#555;}
.agencia{text-align:center;font-weight:bold;font-size:20px;color:#0b2d5c;}
.qr-box{text-align:center;margin-top:20px;}
.qr-box img{width:120px;}
</style>
</head>

<body>
<div class="container">

<div class="card" id="formulario">
<div class="card-header">Formulario de Cotización</div>
<div class="card-body">
<input id="nombre" placeholder="Nombre titular">
<input id="telefono" placeholder="Teléfono cliente">
<input id="correo" placeholder="Correo cliente">
<input id="direccion" placeholder="Dirección del cliente">
<textarea id="acompanantes" placeholder="Nombres de acompañantes"></textarea>

<input id="destino" placeholder="Destino">
<input id="hotel" placeholder="Hotel">
<input id="checkin" type="date">
<input id="checkout" type="date">
<input id="viajeros" placeholder="Número de viajeros">
<input id="habitaciones" placeholder="Número de habitaciones">

<select id="regimen">
<option value="">Seleccione régimen</option>
<option>Todo incluido</option>
<option>Media pensión</option>
<option>Pensión completa</option>
<option>Solo hotel</option>
<option>Hotel + desayuno</option>
</select>

<input id="localizador" placeholder="Localizador (opcional)">
<textarea id="notas" placeholder="Observaciones / Notas"></textarea>
<input id="saldo" placeholder="Saldo restante">

<hr>
<h4>Datos de la agencia</h4>
<input id="agencia_dir" placeholder="Dirección de la agencia">
<input id="agencia_tel" placeholder="Teléfono de la agencia">
<input id="agencia_correo" placeholder="Correo de la agencia">

<button onclick="generarResultado()">Generar Cotización</button>
</div>
</div>

<div id="resultado" style="display:none;">

<div class="agencia">HAPPY DESTINOS TRAVEL</div>
<img src="logo.png" class="logo">
<div class="nit">NIT: 900123456-7</div>
<div class="badge">✔ PRE-RESERVA CONFIRMADA</div>

<div id="contenidoPDF">

<div class="card">
<div class="card-header">Resumen del Viaje</div>
<div class="card-body">
<div class="row">
<div class="item"><div class="label">Destino</div><div class="value" id="r_destino"></div></div>
<div class="item"><div class="label">Hotel</div><div class="value" id="r_hotel"></div></div>
</div>

<div class="row">
<div class="item"><div class="label">Check-in</div><div class="value" id="r_checkin"></div></div>
<div class="item"><div class="label">Check-out</div><div class="value" id="r_checkout"></div></div>
<div class="item"><div class="label">Viajeros</div><div class="value" id="r_viajeros"></div></div>
</div>

<div class="row">
<div class="item"><div class="label">Habitaciones</div><div class="value" id="r_habitaciones"></div></div>
<div class="item"><div class="label">Régimen</div><div class="value" id="r_regimen"></div></div>
<div class="item"><div class="label">Localizador</div><div class="value" id="r_localizador"></div></div>
</div>

<div class="row">
<div class="item"><div class="label">Saldo restante</div><div class="value" id="r_saldo"></div></div>
</div>
</div>
</div>

<div class="qr-box">
<div class="label">Escanea para pagar</div>
<img id="qrImg" src="/mnt/data/image.png">
</div>

</div>

<div class="actions">
<button onclick="descargarPDF()">Descargar PDF</button>
<button class="whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
</div>

</div>

</div>

<script>
let dataGlobal={};
function generarLocalizadorAuto(){return 'HT'+Math.floor(Math.random()*1000000000);} 

function generarResultado(){
let data={
nombre:nombre.value,
telefono:telefono.value,
destino:destino.value,
hotel:hotel.value,
checkin:checkin.value,
checkout:checkout.value,
viajeros:viajeros.value,
habitaciones:habitaciones.value,
regimen:regimen.value,
localizador: localizador.value ? localizador.value : generarLocalizadorAuto(),
saldo:saldo.value
};

dataGlobal=data;
Object.keys(data).forEach(k=>{let el=document.getElementById('r_'+k);if(el) el.innerText=data[k];});
formulario.style.display='none';resultado.style.display='block';
}

function enviarWhatsApp(){
let d=dataGlobal;
let tel = d.telefono.replace(/\D/g,'');
let msg=`*PRE-RESERVA*%0A${d.nombre}%0A${d.destino}%0A${d.hotel}%0A${d.localizador}`;
window.open(`https://wa.me/57${tel}?text=${msg}`,'_blank');
}

async function descargarPDF(){
const { jsPDF } = window.jspdf;
let elemento=document.getElementById("contenidoPDF");
let canvas=await html2canvas(elemento);
let imgData=canvas.toDataURL("image/png");

let doc=new jsPDF('p','mm','a4');
let width=210;
let height=canvas.height*width/canvas.width;

// Header
doc.setFillColor(11,45,92);
doc.rect(0,0,210,25,'F');

// Logo
let logo = new Image();
logo.src = "logo.png";
await new Promise(resolve => logo.onload = resolve);
doc.addImage(logo,'PNG',10,5,30,15);

// Titulo
doc.setTextColor(255,216,107);
doc.setFontSize(16);
doc.text("HAPPY DESTINOS TRAVEL", 50, 15);

// Contenido
doc.addImage(imgData,'PNG',0,25,width,height);

// QR en PDF
let qr = new Image();
qr.src = "/mnt/data/image.png";
await new Promise(resolve => qr.onload = resolve);
doc.addImage(qr,'PNG',80,250,50,50);

// Footer
doc.setFontSize(9);
doc.setTextColor(100);
doc.text("Documento generado por Happy Destinos Travel", 10, 290);

doc.save("PreReserva.pdf");
}
</script>

</body>
</html>
